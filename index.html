<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autistic Figure Skating Club</title>
  <meta name="description" content="Inclusive figure skating club – free lessons every Tuesday at Booster Juice Recreation Centre. All levels welcome, made for fun.">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="header"></div>
  <main>
    <div id="hero"></div>
    <div id="about"></div>
    <div id="programs"></div>
    <div id="schedule"></div>
    <div id="faq"></div>
    <div id="contact"></div>
  </main>
  <div id="footer"></div>

  <script src="main.js"></script>
  <script>
    const components = [
      { id: 'header', file: 'header.html' },
      { id: 'hero', file: 'sections/hero.html' },
      { id: 'about', file: 'sections/about.html' },
      { id: 'programs', file: 'sections/programs.html' },
      { id: 'schedule', file: 'sections/schedule.html' },
      { id: 'faq', file: 'sections/faq.html' },
      { id: 'contact', file: 'sections/contact.html' },
      { id: 'footer', file: 'footer.html' }
    ];
    components.forEach(comp => {
      fetch(comp.file)
        .then(res => res.text())
        .then(html => {
          document.getElementById(comp.id).innerHTML = html;
        })
        .catch(err => console.error(`Error loading ${comp.file}:`, err));
    });
  </script>
</body>
</html>
